name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -v -count=1 ./...
      - name: Test public stubs without CGo
        run: go test -v -count=1 ./pkg/smtc/...
        env:
          CGO_ENABLED: '0'
